services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fmcg_intelligence}
      POSTGRES_USER: ${POSTGRES_USER:-fmcg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fmcg_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fmcg} -d ${POSTGRES_DB:-fmcg_intelligence}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dokploy-network

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dokploy-network

  backend:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-fmcg}:${POSTGRES_PASSWORD:-fmcg_secret}@db:5432/${POSTGRES_DB:-fmcg_intelligence}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-fmcg}:${POSTGRES_PASSWORD:-fmcg_secret}@db:5432/${POSTGRES_DB:-fmcg_intelligence}
      REDIS_URL: redis://redis:6379/0
      APP_ENV: production
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      WORLD_BANK_API_URL: ${WORLD_BANK_API_URL:-https://api.worldbank.org/v2}
      FAO_API_URL: ${FAO_API_URL:-https://www.fao.org/faostat/api/v1}
      APP_SECRET_KEY: ${APP_SECRET_KEY:-change-me}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DEFAULT_CURRENCY: ${DEFAULT_CURRENCY:-USD}
      SECONDARY_CURRENCY: ${SECONDARY_CURRENCY:-LBP}
      LBP_EXCHANGE_RATE: ${LBP_EXCHANGE_RATE:-89500}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dokploy-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    networks:
      - dokploy-network

volumes:
  pgdata:
  redisdata:

networks:
  dokploy-network:
    external: true
