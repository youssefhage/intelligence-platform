services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fmcg_intelligence
      POSTGRES_USER: fmcg
      POSTGRES_PASSWORD: fmcg_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fmcg -d fmcg_intelligence"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://fmcg:fmcg_secret@db:5432/fmcg_intelligence
      DATABASE_URL_SYNC: postgresql://fmcg:fmcg_secret@db:5432/fmcg_intelligence
      REDIS_URL: redis://redis:6379/0

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
