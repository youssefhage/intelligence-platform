services:
  db:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fmcg_intelligence}
      POSTGRES_USER: ${POSTGRES_USER:-fmcg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fmcg_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fmcg} -d ${POSTGRES_DB:-fmcg_intelligence}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dokploy-network

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dokploy-network

  backend:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-fmcg}:${POSTGRES_PASSWORD:-fmcg_secret}@db:5432/${POSTGRES_DB:-fmcg_intelligence}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-fmcg}:${POSTGRES_PASSWORD:-fmcg_secret}@db:5432/${POSTGRES_DB:-fmcg_intelligence}
      REDIS_URL: redis://redis:6379/0
      APP_ENV: production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.fmcg-backend.rule=Host(`${BACKEND_DOMAIN}`) || (Host(`${FRONTEND_DOMAIN}`) && PathPrefix(`/api`))"
      - "traefik.http.routers.fmcg-backend.entrypoints=websecure"
      - "traefik.http.routers.fmcg-backend.tls.certResolver=letsencrypt"
      - "traefik.http.services.fmcg-backend.loadbalancer.server.port=8000"
    networks:
      - dokploy-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.fmcg-frontend.rule=Host(`${FRONTEND_DOMAIN}`)"
      - "traefik.http.routers.fmcg-frontend.entrypoints=websecure"
      - "traefik.http.routers.fmcg-frontend.tls.certResolver=letsencrypt"
      - "traefik.http.services.fmcg-frontend.loadbalancer.server.port=80"
    networks:
      - dokploy-network

volumes:
  pgdata:
  redisdata:

networks:
  dokploy-network:
    external: true
